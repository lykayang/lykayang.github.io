<p>2、建仓操作：</p>
<p style="padding-left: 30px;">a、无脑买入建底仓，</p>
<p style="padding-left: 30px;">b、低于5日均线4%个点建浮动仓；</p>
<p>3、操作纪律</p>
<p style="padding-left: 30px;">a、单时间点价位高于5日均线5-7%，卖出浮动仓</p>
<p style="padding-left: 30px;">b、单时间点价位高于前次操作2-3%，卖出</p>
<p style="padding-left: 30px;">c、单时间点价位低于前次操作3-4%，机动资金再买入</p>
<p style="padding-left: 30px;">d、单时间点价位低于5日均线5-7%，全买入</p>
