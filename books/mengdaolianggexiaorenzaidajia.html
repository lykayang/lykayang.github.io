            <h2 class="block-title">梦到两个小人在打架</h2>
        </header>
        <div class="entry-content grap">
            
<p>对算命这事，我是从信到不信的历程。现在我的认识是，人是有自由意识，没有命运天定。如果所有事情都在出生时注定，做人还有什么乐趣？</p>



<p>我妈去世后，偶尔想起快十年前，S3给我看八字命盘（好象是这个），说到父母缘薄，不禁心下戚戚。</p>



<p>昨天夜里临睡前，看到D版有人说去算命很准，楼下有6页回贴在求算命的淘宝店。</p>



<p>半夜梦中有两个小人打了起来，一个叫自由意识，一个叫决定论。。。半梦半醒间，我“起来”喝退这两个小人。</p>



<p>早上醒来，心有余悸。这情况继续，会不会精神分裂。</p>
